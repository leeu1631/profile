<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль Дианы Жидковой</title>
    <style>
        :root {
            --bg-color: #fff0f5;
            --card-bg: #ffffff;
            --main-pink: #ff69b4;
            --hover-pink: #ff1493;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
            text-align: center;
            max-width: 350px;
            width: 100%;
            border: 2px solid rgba(255, 105, 180, 0.2);
        }

        h1 {
            color: var(--main-pink);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .company {
            font-size: 16px;
            color: #888;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .tg-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--main-pink);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .tg-link:hover {
            background-color: var(--hover-pink);
            transform: translateY(-2px);
        }

        .tg-link img {
            width: 20px;
            height: 20px;
            /* Перекрашивает черную иконку Simple Icons в белый цвет */
            filter: invert(100%) sepia(0%) saturate(7460%) hue-rotate(61deg) brightness(119%) contrast(119%);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Диана Жидкова</h1>
        <div class="company">RestoPNL</div>
        <a href="https://t.me/jidkovskaya" target="_blank" class="tg-link">
            <svg role="img" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><title>Telegram</title><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            @jidkovskaya
        </a>
    </div>

</body>
</html>
